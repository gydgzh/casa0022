<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Holographic Virtual Librarian</title>
  <style>
    :root {
      color-scheme: dark;
      --fg: #e8e8e8;
      --accent: #7be0c9;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; }
    #pyramid-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
    }
    .panel {
      position: fixed;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #hud { top: 12px; left: 12px; min-width: 200px; }
    #controls { top: 12px; right: 12px; }
    #preview {
      position: fixed; bottom: 12px; left: 12px; z-index: 10;
      width: 160px; height: 120px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: #111;
      object-fit: cover;
      transform: scaleX(-1); /* mirror selfie preview */
    }
    button, select {
      background: #1d1d1d;
      color: var(--fg);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: #292929; }
    .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .ok { color: var(--accent); }
    .warn { color: #f5b169; }
    .err { color: #ff6b6b; }
    .hide { display: none !important; }
    /* Display-only mode (iPad): hide everything except the canvas */
    body.display-mode .panel,
    body.display-mode #preview { display: none; }
  </style>
  <script type="module" crossorigin src="/assets/index-Br0yzAZn.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="pyramid-canvas"></canvas>
    <video id="preview" autoplay muted playsinline></video>

    <div id="hud" class="panel">
      <div><strong>Holographic Virtual Librarian</strong></div>
      <div class="row">Mode: <span id="mode-label">capture</span></div>
      <div class="row">FPS: <span id="fps">--</span></div>
      <div class="row">Latency: <span id="latency">--</span> ms</div>
      <div class="row">Status: <span id="status" class="warn">starting…</span></div>
      <div class="row" style="font-size:11px;opacity:.7">URL: <code>?mode=capture|display|demo</code></div>
    </div>

    <div id="controls" class="panel">
      <div class="row">
        <label>Tracker:</label>
        <select id="tracker">
          <option value="face">Face only</option>
          <option value="pose">Body only</option>
          <option value="holistic">Face + Body</option>
        </select>
      </div>
      <div class="row">
        <label>Layout:</label>
        <select id="layout">
          <option value="pyramid">4-view pyramid</option>
          <option value="single">Single (debug)</option>
        </select>
      </div>
      <div class="row">
        <label>Avatar:</label>
        <select id="avatar">
          <option value="placeholder">Placeholder head</option>
          <option value="vrm-sample">Sample VRM (online)</option>
          <option value="custom">Custom (drop GLB/VRM)</option>
        </select>
      </div>
      <div class="row">
        <input type="file" id="avatar-file" accept=".vrm,.glb" style="font-size:11px;" />
      </div>
      <div class="row">
        <button id="fullscreen-btn">Fullscreen</button>
        <button id="reload-btn">Reload</button>
      </div>
    </div>
  </div>

</body>
</html>
