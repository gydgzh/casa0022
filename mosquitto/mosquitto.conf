# mosquitto.conf
# ==============
# Two listeners:
#   :1883 — plain TCP for the Arduino MKR (publisher)
#   :9001 — WebSocket for the browser (Vite proxies wss://…/mqtt → here)
#
# Run with:
#   mosquitto -c mosquitto/mosquitto.conf -v
#
# (Verbose -v lets you see Arduino connect/publish lines during testing.)

listener 1883 0.0.0.0
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true

# In-memory persistence is plenty for a 1 Hz sensor stream.
persistence false

# Cap retained messages so the broker doesn't grow unbounded.
max_queued_messages 100
