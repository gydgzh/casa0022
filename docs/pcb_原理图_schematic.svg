<svg viewBox="0 0 1020 820" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title  { font-size: 21px; font-weight: 700; fill: #1a1a2e; }
    .sub    { font-size: 12.5px; fill: #555; }
    .comp   { fill: #f4f7fb; stroke: #11576b; stroke-width: 2; }
    .compbme{ fill: #eef5e6; stroke: #5a7d3c; stroke-width: 2; }
    .comprc { fill: #fbf2ee; stroke: #b5532b; stroke-width: 2; }
    .ctx    { font-size: 14px; font-weight: 700; fill: #11576b; }
    .ctxg   { font-size: 14px; font-weight: 700; fill: #2f4d18; }
    .ctxr   { font-size: 14px; font-weight: 700; fill: #8a3a18; }
    .pin    { font-size: 11px; fill: #222; }
    .wire   { stroke: #444; stroke-width: 1.4; }
    .nl3v3  { fill: #fde2e2; stroke: #d23; stroke-width: 1.3; }
    .nlgnd  { fill: #e6e6e6; stroke: #333; stroke-width: 1.3; }
    .nli2c  { fill: #e2eef9; stroke: #1769aa; stroke-width: 1.3; }
    .nlspi  { fill: #fbeadf; stroke: #b5532b; stroke-width: 1.3; }
    .nltx   { font-size: 11px; font-weight: 700; fill: #1a1a2e; }
    .note   { font-size: 12px; fill: #333; }
    .notehd { font-size: 13px; font-weight: 700; fill: #1a1a2e; }
  </style>

  <text x="28" y="34" class="title">原理图 · Schematic — MKR WiFi 1010 传感器盾板</text>
  <text x="28" y="54" class="sub">网络标号画法：相同名字的标签 = 电气相连（net labels）。VL53L0X/BME280 焊在板上，RC522 外接。</text>

  <!-- ============ Legend ============ -->
  <rect x="28" y="68" width="964" height="30" rx="6" fill="#f7f7fb" stroke="#ccc"/>
  <text x="40" y="88" class="note">图例：</text>
  <rect x="92" y="74" width="60" height="18" rx="4" class="nl3v3"/><text x="122" y="87" text-anchor="middle" class="nltx">+3V3</text>
  <rect x="166" y="74" width="60" height="18" rx="4" class="nlgnd"/><text x="196" y="87" text-anchor="middle" class="nltx">GND</text>
  <rect x="240" y="74" width="60" height="18" rx="4" class="nli2c"/><text x="270" y="87" text-anchor="middle" class="nltx">I²C</text>
  <rect x="314" y="74" width="60" height="18" rx="4" class="nlspi"/><text x="344" y="87" text-anchor="middle" class="nltx">SPI</text>
  <text x="392" y="88" class="note">→ 同名网络在 PCB 上连到一起，无需画连线。</text>

  <!-- ============ MKR component (left) ============ -->
  <rect x="90" y="130" width="190" height="560" rx="8" class="comp"/>
  <text x="185" y="158" text-anchor="middle" class="ctx">Arduino MKR WiFi 1010</text>
  <text x="185" y="176" text-anchor="middle" class="sub">主控（U0）</text>

  <!-- MKR pins: name inside, wire stub right, net label -->
  <!-- 3V3 -->
  <text x="272" y="214" text-anchor="end" class="pin">3V3</text>
  <line x1="280" y1="210" x2="320" y2="210" class="wire"/>
  <rect x="322" y="200" width="64" height="20" rx="4" class="nl3v3"/><text x="354" y="214" text-anchor="middle" class="nltx">+3V3</text>
  <!-- GND -->
  <text x="272" y="249" text-anchor="end" class="pin">GND</text>
  <line x1="280" y1="245" x2="320" y2="245" class="wire"/>
  <rect x="322" y="235" width="64" height="20" rx="4" class="nlgnd"/><text x="354" y="249" text-anchor="middle" class="nltx">GND</text>
  <!-- D11 SDA -->
  <text x="272" y="299" text-anchor="end" class="pin">D11</text>
  <line x1="280" y1="295" x2="320" y2="295" class="wire"/>
  <rect x="322" y="285" width="64" height="20" rx="4" class="nli2c"/><text x="354" y="299" text-anchor="middle" class="nltx">SDA</text>
  <!-- D12 SCL -->
  <text x="272" y="334" text-anchor="end" class="pin">D12</text>
  <line x1="280" y1="330" x2="320" y2="330" class="wire"/>
  <rect x="322" y="320" width="64" height="20" rx="4" class="nli2c"/><text x="354" y="334" text-anchor="middle" class="nltx">SCL</text>
  <!-- D8 MOSI -->
  <text x="272" y="389" text-anchor="end" class="pin">D8</text>
  <line x1="280" y1="385" x2="320" y2="385" class="wire"/>
  <rect x="322" y="375" width="64" height="20" rx="4" class="nlspi"/><text x="354" y="389" text-anchor="middle" class="nltx">MOSI</text>
  <!-- D9 SCK -->
  <text x="272" y="424" text-anchor="end" class="pin">D9</text>
  <line x1="280" y1="420" x2="320" y2="420" class="wire"/>
  <rect x="322" y="410" width="64" height="20" rx="4" class="nlspi"/><text x="354" y="424" text-anchor="middle" class="nltx">SCK</text>
  <!-- D10 MISO -->
  <text x="272" y="459" text-anchor="end" class="pin">D10</text>
  <line x1="280" y1="455" x2="320" y2="455" class="wire"/>
  <rect x="322" y="445" width="64" height="20" rx="4" class="nlspi"/><text x="354" y="459" text-anchor="middle" class="nltx">MISO</text>
  <!-- D5 SS -->
  <text x="272" y="509" text-anchor="end" class="pin">D5</text>
  <line x1="280" y1="505" x2="320" y2="505" class="wire"/>
  <rect x="322" y="495" width="64" height="20" rx="4" class="nlspi"/><text x="354" y="509" text-anchor="middle" class="nltx">SS</text>
  <!-- D4 RST -->
  <text x="272" y="544" text-anchor="end" class="pin">D4</text>
  <line x1="280" y1="540" x2="320" y2="540" class="wire"/>
  <rect x="322" y="530" width="64" height="20" rx="4" class="nlspi"/><text x="354" y="544" text-anchor="middle" class="nltx">RST</text>

  <!-- ============ VL53L0X (right top) ============ -->
  <rect x="720" y="135" width="200" height="135" rx="8" class="comp"/>
  <text x="820" y="162" text-anchor="middle" class="ctx">VL53L0X (U1)</text>
  <text x="820" y="179" text-anchor="middle" class="sub">焊在板上 · addr 0x29</text>
  <!-- pins left edge -->
  <line x1="680" y1="200" x2="720" y2="200" class="wire"/><text x="728" y="204" class="pin">VCC</text>
  <rect x="612" y="190" width="64" height="20" rx="4" class="nl3v3"/><text x="644" y="204" text-anchor="middle" class="nltx">+3V3</text>
  <line x1="680" y1="225" x2="720" y2="225" class="wire"/><text x="728" y="229" class="pin">GND</text>
  <rect x="612" y="215" width="64" height="20" rx="4" class="nlgnd"/><text x="644" y="229" text-anchor="middle" class="nltx">GND</text>
  <line x1="680" y1="250" x2="720" y2="250" class="wire"/><text x="728" y="254" class="pin">SDA</text>
  <rect x="612" y="240" width="64" height="20" rx="4" class="nli2c"/><text x="644" y="254" text-anchor="middle" class="nltx">SDA</text>
  <line x1="680" y1="275" x2="720" y2="275" class="wire" transform="translate(0,-10)"/>
  <text x="728" y="269" class="pin">SCL</text>
  <rect x="612" y="255" width="64" height="20" rx="4" class="nli2c"/><text x="644" y="269" text-anchor="middle" class="nltx">SCL</text>

  <!-- ============ BME280 (right mid) ============ -->
  <rect x="720" y="320" width="200" height="160" rx="8" class="compbme"/>
  <text x="820" y="347" text-anchor="middle" class="ctxg">BME280 (U2)</text>
  <text x="820" y="364" text-anchor="middle" class="sub">焊在板上 · addr 0x76</text>
  <line x1="680" y1="388" x2="720" y2="388" class="wire"/><text x="728" y="392" class="pin">VCC</text>
  <rect x="612" y="378" width="64" height="20" rx="4" class="nl3v3"/><text x="644" y="392" text-anchor="middle" class="nltx">+3V3</text>
  <line x1="680" y1="413" x2="720" y2="413" class="wire"/><text x="728" y="417" class="pin">GND</text>
  <rect x="612" y="403" width="64" height="20" rx="4" class="nlgnd"/><text x="644" y="417" text-anchor="middle" class="nltx">GND</text>
  <line x1="680" y1="438" x2="720" y2="438" class="wire"/><text x="728" y="442" class="pin">SDA</text>
  <rect x="612" y="428" width="64" height="20" rx="4" class="nli2c"/><text x="644" y="442" text-anchor="middle" class="nltx">SDA</text>
  <line x1="680" y1="463" x2="720" y2="463" class="wire"/><text x="728" y="467" class="pin">SCL</text>
  <rect x="612" y="453" width="64" height="20" rx="4" class="nli2c"/><text x="644" y="467" text-anchor="middle" class="nltx">SCL</text>
  <text x="820" y="475" text-anchor="middle" class="sub">6 针：CSB→+3V3, SDO→GND</text>

  <!-- ============ RC522 (right bottom, external) ============ -->
  <rect x="720" y="525" width="200" height="240" rx="8" class="comprc"/>
  <text x="820" y="552" text-anchor="middle" class="ctxr">RC522 (J1, 外接)</text>
  <text x="820" y="569" text-anchor="middle" class="sub">板上 7 针接口 · 模块板外</text>
  <line x1="680" y1="592" x2="720" y2="592" class="wire"/><text x="728" y="596" class="pin">3V3</text>
  <rect x="612" y="582" width="64" height="20" rx="4" class="nl3v3"/><text x="644" y="596" text-anchor="middle" class="nltx">+3V3</text>
  <line x1="680" y1="617" x2="720" y2="617" class="wire"/><text x="728" y="621" class="pin">GND</text>
  <rect x="612" y="607" width="64" height="20" rx="4" class="nlgnd"/><text x="644" y="621" text-anchor="middle" class="nltx">GND</text>
  <line x1="680" y1="642" x2="720" y2="642" class="wire"/><text x="728" y="646" class="pin">SS</text>
  <rect x="612" y="632" width="64" height="20" rx="4" class="nlspi"/><text x="644" y="646" text-anchor="middle" class="nltx">SS</text>
  <line x1="680" y1="667" x2="720" y2="667" class="wire"/><text x="728" y="671" class="pin">SCK</text>
  <rect x="612" y="657" width="64" height="20" rx="4" class="nlspi"/><text x="644" y="671" text-anchor="middle" class="nltx">SCK</text>
  <line x1="680" y1="692" x2="720" y2="692" class="wire"/><text x="728" y="696" class="pin">MOSI</text>
  <rect x="612" y="682" width="64" height="20" rx="4" class="nlspi"/><text x="644" y="696" text-anchor="middle" class="nltx">MOSI</text>
  <line x1="680" y1="717" x2="720" y2="717" class="wire"/><text x="728" y="721" class="pin">MISO</text>
  <rect x="612" y="707" width="64" height="20" rx="4" class="nlspi"/><text x="644" y="721" text-anchor="middle" class="nltx">MISO</text>
  <line x1="680" y1="742" x2="720" y2="742" class="wire"/><text x="728" y="746" class="pin">RST</text>
  <rect x="612" y="732" width="64" height="20" rx="4" class="nlspi"/><text x="644" y="746" text-anchor="middle" class="nltx">RST</text>
  <text x="820" y="758" text-anchor="middle" class="sub">IRQ 不接（NC）</text>

  <!-- ============ Notes ============ -->
  <rect x="28" y="600" width="540" height="190" rx="10" fill="#f7f7fb" stroke="#ccc"/>
  <text x="44" y="624" class="notehd">说明 · Notes</text>
  <text x="44" y="648" class="note">1. 网络标号画法：凡是名字相同的标签（如两个 SDA）</text>
  <text x="60" y="666" class="note">在 PCB 上就是同一根网络，连在一起。</text>
  <text x="44" y="690" class="note">2. I²C：SDA=D11、SCL=D12，VL53L0X 与 BME280 并联共用。</text>
  <text x="44" y="714" class="note">3. SPI：MOSI=D8 SCK=D9 MISO=D10；RC522 片选 SS=D5、复位 RST=D4。</text>
  <text x="44" y="738" class="note">4. 模块自带 I²C 上拉，板上不放电阻。全部 +3V3 供电。</text>
  <text x="44" y="762" class="note">5. RC522 接口放板边、附近不铺铜；模块用短线引到板外。</text>
  <text x="44" y="783" class="note">引脚与固件 library_sensors.ino 完全一致。</text>
</svg>
