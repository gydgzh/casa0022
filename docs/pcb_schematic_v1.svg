<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title   { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .sub     { font-size: 13px; fill: #555; }
    .board   { fill: #11576b; }
    .boardtx { fill: #eaf6fa; font-size: 13px; font-weight: 700; }
    .pin     { font-size: 11px; fill: #1a1a2e; }
    .pinbox  { fill: #fff; stroke: #11576b; stroke-width: 1.5; }
    .sensor  { fill: #eef5e6; stroke: #5a7d3c; stroke-width: 2; }
    .sensortx{ font-size: 14px; font-weight: 700; fill: #2f4d18; }
    .sensorsm{ font-size: 11px; fill: #5a6b48; }
    .tag     { font-size: 10px; font-weight:700; fill: #2f4d18; }
    .rfidbox { fill: #fbf2ee; stroke: #b5532b; stroke-width: 2; stroke-dasharray: 7 4; }
    .rfidtx  { font-size: 13px; font-weight: 700; fill: #8a3a18; }
    .pwr     { stroke: #d23; stroke-width: 2.5; }
    .gnd     { stroke: #222; stroke-width: 2.5; }
    .i2c     { stroke: #1769aa; stroke-width: 2.5; }
    .spi     { stroke: #b5532b; stroke-width: 2.5; }
    .lbl     { font-size: 10.5px; fill: #333; }
    .note    { font-size: 12.5px; fill: #333; }
    .notehd  { font-size: 13px; font-weight: 700; fill: #1a1a2e; }
  </style>

  <!-- Title -->
  <text x="28" y="36" class="title">MKR WiFi 1010 传感器 PCB 示意图（最简版）· Sensor Shield</text>
  <text x="28" y="58" class="sub">VL53L0X + BME280 模块焊在板上 · RC522 外接 · 无预留口 · 无上拉电阻</text>

  <!-- ================= MKR board ================= -->
  <rect x="40" y="110" width="150" height="370" rx="10" class="board"/>
  <text x="115" y="135" text-anchor="middle" class="boardtx">Arduino</text>
  <text x="115" y="152" text-anchor="middle" class="boardtx">MKR WiFi 1010</text>
  <text x="115" y="172" text-anchor="middle" fill="#bcdfe9" font-size="10">（NINA WiFi + SAMD21）</text>

  <!-- left pin column (power + I2C) -->
  <rect x="22"  y="205" width="40" height="22" class="pinbox"/><text x="42" y="220" text-anchor="middle" class="pin">3V3</text>
  <rect x="22"  y="233" width="40" height="22" class="pinbox"/><text x="42" y="248" text-anchor="middle" class="pin">GND</text>
  <rect x="22"  y="275" width="40" height="22" class="pinbox"/><text x="42" y="290" text-anchor="middle" class="pin">11 SDA</text>
  <rect x="22"  y="303" width="40" height="22" class="pinbox"/><text x="42" y="318" text-anchor="middle" class="pin">12 SCL</text>
  <!-- right pin column (SPI + control) -->
  <rect x="168" y="350" width="40" height="22" class="pinbox"/><text x="188" y="365" text-anchor="middle" class="pin">8 MOSI</text>
  <rect x="168" y="378" width="40" height="22" class="pinbox"/><text x="188" y="393" text-anchor="middle" class="pin">9 SCK</text>
  <rect x="168" y="406" width="40" height="22" class="pinbox"/><text x="188" y="421" text-anchor="middle" class="pin">10 MISO</text>
  <rect x="168" y="434" width="40" height="22" class="pinbox"/><text x="188" y="449" text-anchor="middle" class="pin">5 SS</text>
  <rect x="168" y="462" width="40" height="22" class="pinbox"/><text x="188" y="477" text-anchor="middle" class="pin">4 RST</text>

  <!-- ================= PCB shield area ================= -->
  <rect x="250" y="92" width="430" height="408" rx="14" fill="#fbfdff" stroke="#11576b" stroke-width="2"/>
  <text x="265" y="114" class="notehd" fill="#11576b">自制 PCB 盾板（插在 MKR 上）· Custom shield</text>

  <!-- Power rails -->
  <line x1="62" y1="216" x2="300" y2="216" class="pwr"/>
  <line x1="300" y1="150" x2="300" y2="470" class="pwr"/>
  <text x="300" y="146" class="lbl" fill="#d23">3V3 电源轨</text>
  <line x1="62" y1="244" x2="320" y2="244" class="gnd"/>
  <line x1="320" y1="160" x2="320" y2="478" class="gnd"/>
  <text x="326" y="156" class="lbl">GND 地轨</text>

  <!-- I2C bus -->
  <line x1="62" y1="286" x2="360" y2="286" class="i2c"/>
  <line x1="62" y1="314" x2="380" y2="314" class="i2c"/>
  <line x1="360" y1="200" x2="360" y2="300" class="i2c"/>
  <line x1="380" y1="200" x2="380" y2="300" class="i2c"/>
  <text x="392" y="262" class="lbl" fill="#1769aa">I²C (SDA/SCL)</text>

  <!-- VL53L0X on-board module -->
  <rect x="440" y="160" width="225" height="78" rx="8" class="sensor"/>
  <rect x="612" y="150" width="44" height="18" rx="4" fill="#cfe3b6"/><text x="634" y="163" text-anchor="middle" class="tag">焊在板上</text>
  <text x="452" y="184" class="sensortx">VL53L0X 距离 / 人体检测</text>
  <text x="452" y="203" class="sensorsm">I²C · 模块焊在 PCB 上 · addr 0x29</text>
  <text x="452" y="219" class="sensorsm">presence：&lt;1m 算有人（自带上拉）</text>
  <line x1="320" y1="195" x2="440" y2="195" class="gnd"/>
  <line x1="300" y1="200" x2="440" y2="200" class="pwr"/>
  <line x1="380" y1="214" x2="440" y2="214" class="i2c"/>

  <!-- BME280 on-board module -->
  <rect x="440" y="262" width="225" height="78" rx="8" class="sensor"/>
  <rect x="612" y="252" width="44" height="18" rx="4" fill="#cfe3b6"/><text x="634" y="265" text-anchor="middle" class="tag">焊在板上</text>
  <text x="452" y="286" class="sensortx">BME280 温/湿/气压</text>
  <text x="452" y="305" class="sensorsm">I²C · 模块焊在 PCB 上 · addr 0x76</text>
  <text x="452" y="321" class="sensorsm">6 针模块：CSB→3V3、SDO→GND</text>
  <line x1="320" y1="296" x2="440" y2="296" class="gnd"/>
  <line x1="300" y1="308" x2="440" y2="308" class="pwr"/>
  <line x1="380" y1="314" x2="440" y2="314" class="i2c"/>

  <!-- SPI bus to RC522 connector -->
  <line x1="208" y1="361" x2="430" y2="361" class="spi"/>
  <line x1="208" y1="389" x2="430" y2="389" class="spi"/>
  <line x1="208" y1="417" x2="430" y2="417" class="spi"/>
  <line x1="208" y1="445" x2="430" y2="445" class="spi"/>
  <line x1="208" y1="473" x2="430" y2="473" class="spi"/>

  <!-- RC522 on-board 7-pin connector -->
  <rect x="430" y="360" width="200" height="130" rx="8" fill="#fff" stroke="#b5532b" stroke-width="2"/>
  <text x="530" y="381" text-anchor="middle" class="rfidtx">RC522 接口排针（板上）</text>
  <text x="530" y="396" text-anchor="middle" class="sensorsm">7-pin · 放板边 · 附近不铺铜</text>
  <g class="pin" font-size="11">
    <text x="445" y="416">SS → D5</text>
    <text x="445" y="433">SCK → D9</text>
    <text x="445" y="450">MOSI → D8</text>
    <text x="445" y="467">MISO → D10</text>
    <text x="445" y="484">RST → D4 · 3V3 · GND（IRQ 空）</text>
  </g>

  <!-- ================= RC522 off-board module ================= -->
  <rect x="715" y="360" width="218" height="150" rx="10" class="rfidbox"/>
  <text x="824" y="384" text-anchor="middle" class="rfidtx">RC522 读卡模块</text>
  <text x="824" y="401" text-anchor="middle" class="sensorsm">板外分离 · OFF-BOARD</text>
  <rect x="742" y="414" width="164" height="64" rx="6" fill="#fff" stroke="#b5532b" stroke-width="1.5"/>
  <text x="824" y="438" text-anchor="middle" class="sensorsm">立在塑料/木支架上 · 天线朝外</text>
  <text x="824" y="456" text-anchor="middle" class="sensorsm">背后【无金属 / 无铺铜】</text>
  <text x="824" y="498" text-anchor="middle" class="sensorsm">短排线 ≤15cm 接到左边排针</text>
  <line x1="630" y1="430" x2="715" y2="430" class="spi"/>
  <polygon points="715,430 705,425 705,435" fill="#b5532b"/>

  <!-- ================= Notes ================= -->
  <rect x="40" y="520" width="893" height="68" rx="10" fill="#f7f7fb" stroke="#ccc"/>
  <text x="56" y="542" class="notehd">设计要点 · Design notes</text>
  <text x="56" y="562" class="note">① VL53L0X 与 BME280 现成模块【直接焊在 PCB 上】，共用一条 I²C（0x29 / 0x76）；模块自带上拉，板上不放电阻。全部 3.3V 供电。</text>
  <text x="56" y="580" class="note">② RC522 只在板上留 7 针接口、放板边且附近不铺铜，模块用短线引到板外（背后无金属，否则天线失谐读不到卡）。无任何预留口。</text>
</svg>
